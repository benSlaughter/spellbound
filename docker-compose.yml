services:
  spellbound:
    image: ghcr.io/benslaughter/spellbound:latest
    build: .
    container_name: spellbound
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - spellbound-data:/app/data
      - ./public/images/puzzles:/app/public/images/puzzles:ro
    environment:
      - NODE_ENV=production
      - PORT=3000

volumes:
  spellbound-data:
